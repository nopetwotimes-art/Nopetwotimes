<!DOCTYPE html>
<html>
<head>
<title>The Commons - Working Version</title>
<style>
body{
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}
input, button, textarea{
  margin:5px;
  padding:5px;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
}
#library, #chatroom, #secret, #treasure{display:none;}
#chatbox{
  height:100px;
  overflow-y:scroll;
  border:1px solid #00ffcc;
  margin:10px;
}
.post{border:1px solid #00ffcc; margin:5px; padding:5px;}
</style>
</head>
<body>

<h1>THE COMMONS</h1>

<!-- First Puzzle -->
<div id="entrance">
  <h2>Entrance Room</h2>
  <p>Solve the riddle to enter:</p>
  <p>I speak without a mouth<br>I hear without ears<br>I have no body<br>But I come alive with wind</p>
  <input id="puzzleAnswer">
  <button onclick="checkPuzzle()">Enter</button>
</div>

<!-- Library Room -->
<div id="library">
  <h2>Library Room</h2>
  <p>Bulletin board:</p>
  <textarea id="boardText"></textarea><br>
  <button onclick="postMessage()">Post</button>
  <div id="board"></div>
  <br>
  <button onclick="showChat()">Go to Chat Room</button>
  <button onclick="showSecret()">Go to Secret Room</button>
</div>

<!-- Chat Room -->
<div id="chatroom">
  <h2>Chat Room</h2>
  <div id="chatbox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>
  <br>
  <button onclick="showLibrary()">Back to Library</button>
</div>

<!-- Secret Room -->
<div id="secret">
  <h2>Secret Room</h2>
  <p>What gets wetter the more it dries?</p>
  <input id="secretAnswer">
  <button onclick="unlockSecret()">Unlock</button>
  <br>
  <button onclick="showLibrary()">Back to Library</button>
  <div id="treasure">
    <p>🎉 Congratulations! Hidden treasure found.</p>
  </div>
</div>

<script>
// Anonymous visitor
let anon="Visitor-"+Math.floor(Math.random()*9999);

// First puzzle
function checkPuzzle(){
  let answer=document.getElementById("puzzleAnswer").value.toLowerCase().trim();
  if(answer==="echo"){
    document.getElementById("entrance").style.display="none";
    document.getElementById("library").style.display="block";
    addChat("The Commons: Welcome, "+anon+"! Explore the library, chat room, or secret room.");
  } else {
    alert("Wrong! Try again.");
  }
}

// Bulletin board
function postMessage(){
  let text=document.getElementById("boardText").value.trim();
  if(text==="") return;
  let div=document.createElement("div");
  div.className="post";
  div.innerText=anon+": "+text;
  document.getElementById("board").prepend(div);
  document.getElementById("boardText").value='';
}

// Chat
function showChat(){
  document.getElementById("library").style.display="none";
  document.getElementById("chatroom").style.display="block";
}

function showLibrary(){
  document.getElementById("chatroom").style.display="none";
  document.getElementById("secret").style.display="none";
  document.getElementById("library").style.display="block";
}

function showSecret(){
  document.getElementById("library").style.display="none";
  document.getElementById("secret").style.display="block";
}

function sendMessage(){
  let msg=document.getElementById("chatInput").value.trim();
  if(msg==="") return;
  addChat(anon+": "+msg);

  // Interactive responses
  let lower=msg.toLowerCase();
  if(lower.includes("hello") || lower.includes("hi")){
    addChat("The Commons: Hello "+anon+"!");
  }
  if(lower.includes("help")){
    addChat("The Commons: Type messages, explore rooms, or solve puzzles!");
  }
  if(lower.includes("secret")){
    addChat("The Commons: Perhaps check the Secret Room...");
  }
  if(lower.includes("towel")){
    addChat("The Commons: That might be a clue for the secret room!");
  }

  document.getElementById("chatInput").value='';
}

function addChat(text){
  let chatbox=document.getElementById("chatbox");
  let div=document.createElement("div");
  div.innerText=text;
  div.style.color=text.startsWith("The Commons:") ? "#ffcc00" : "#00ffcc";
  chatbox.appendChild(div);
  chatbox.scrollTop=chatbox.scrollHeight;
}

// Secret Room
function unlockSecret(){
  let ans=document.getElementById("secretAnswer").value.toLowerCase().trim();
  if(ans==="towel"){
    document.getElementById("treasure").style.display="block";
    addChat("The Commons: You found the hidden treasure!");
  } else {
    alert("Wrong! Try again.");
  }
}
</script>

</body>
</html>
