<!DOCTYPE html>
<html>
<head>
<title>The Commons - Simple Version</title>
<style>
body{
  margin:20px;
  background:black;
  color:#00ffcc;
  font-family:monospace;
  text-align:center;
}
input, button, textarea{
  margin:5px;
  padding:5px;
  background:black;
  color:#00ffcc;
  border:1px solid #00ffcc;
}
#main, #secret, #treasure{display:none;}
#chatbox{
  height:100px;
  overflow-y:scroll;
  border:1px solid #00ffcc;
  margin:10px;
}
.post{border:1px solid #00ffcc; margin:5px; padding:5px;}
</style>
</head>
<body>

<h1>THE COMMONS (Simple Version)</h1>

<!-- First Puzzle -->
<div id="puzzle">
  <p>Solve the riddle to enter:</p>
  <p>
    I speak without a mouth<br>
    I hear without ears<br>
    I have no body<br>
    But I come alive with wind
  </p>
  <input id="answer">
  <button onclick="checkPuzzle()">Enter</button>
</div>

<!-- Main Area -->
<div id="main">
  <h3 id="anon"></h3>

  <h2>Bulletin Board</h2>
  <textarea id="postText"></textarea><br>
  <button onclick="postMessage()">Post</button>
  <div id="board"></div>

  <h2>Chat</h2>
  <div id="chatbox"></div>
  <input id="chatInput">
  <button onclick="sendMessage()">Send</button>

  <br><br>
  <button onclick="showSecret()">Search for hidden room</button>
</div>

<!-- Secret Room -->
<div id="secret">
  <h2>Secret Room</h2>
  <p>What gets wetter the more it dries?</p>
  <input id="secretAnswer">
  <button onclick="unlockSecret()">Unlock</button>
  <div id="treasure">
    <p>🎉 Congratulations! You found the secret.</p>
  </div>
</div>

<script>
// Anonymous visitor
let anon="Visitor-"+Math.floor(Math.random()*9999);
document.getElementById("anon").innerText="You are "+anon;

// First puzzle
function checkPuzzle(){
  let a=document.getElementById("answer").value.toLowerCase().trim();
  if(a==="echo"){
    document.getElementById("puzzle").style.display="none";
    document.getElementById("main").style.display="block";
  } else {
    alert("Wrong! Try again.");
  }
}

// Bulletin board
function postMessage(){
  let text=document.getElementById("postText").value.trim();
  if(text==="") return;
  let div=document.createElement("div");
  div.className="post";
  div.innerText=anon+": "+text;
  document.getElementById("board").prepend(div);
  document.getElementById("postText").value="";
}

// Chat
function sendMessage(){
  let msg=document.getElementById("chatInput").value.trim();
  if(msg==="") return;
  let div=document.createElement("div");
  div.innerText=anon+": "+msg;
  document.getElementById("chatbox").appendChild(div);
  document.getElementById("chatInput").value="";
  document.getElementById("chatbox").scrollTop=document.getElementById("chatbox").scrollHeight;
}

// Secret room
function showSecret(){
  document.getElementById("secret").style.display="block";
}

function unlockSecret(){
  let a=document.getElementById("secretAnswer").value.toLowerCase().trim();
  if(a==="towel"){
    document.getElementById("treasure").style.display="block";
  } else {
    alert("Wrong! Try again.");
  }
}
</script>

</body>
</html>
